global:
  scrape_interval: 15s

scrape_configs:
  - job_name: dpin-api
    static_configs:
      - targets: ["api:3001"]
    metrics_path: /metrics

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
