name: Terraform Plan

on:
  pull_request:
    paths:
      - 'infra/terraform/**'

jobs:
  plan-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
      - run: terraform -chdir=infra/terraform/environments/dev init
      - run: terraform -chdir=infra/terraform/environments/dev validate

  plan-prod:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
      - run: terraform -chdir=infra/terraform/environments/prod init
      - run: terraform -chdir=infra/terraform/environments/prod validate
