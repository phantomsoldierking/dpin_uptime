apiVersion: v1
kind: Secret
metadata:
  name: dpin-api-secrets
  namespace: dpin
type: Opaque
stringData:
  DATABASE_URL: "postgresql://dpin:replace@rds-host:5432/dpin"
  JWT_SECRET: "replace-with-strong-secret"
---
apiVersion: v1
kind: Secret
metadata:
  name: dpin-validator-secrets
  namespace: dpin
type: Opaque
stringData:
  NODE_API_KEY: "replace-node-api-key"
  NODE_HMAC_SECRET: "replace-node-hmac-secret"
