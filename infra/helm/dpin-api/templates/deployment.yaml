apiVersion: apps/v1
kind: Deployment
metadata:
  name: dpin-api
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: dpin-api
  template:
    metadata:
      labels:
        app: dpin-api
    spec:
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: {{ .Values.env.NODE_ENV | quote }}
            - name: PORT
              value: {{ .Values.env.PORT | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.env.LOG_LEVEL | quote }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dpin-api-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: dpin-api-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: dpin-api
spec:
  type: {{ .Values.service.type }}
  selector:
    app: dpin-api
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3001
