name: dpin-infra

services:
  postgres:
    image: postgres:16
    container_name: dpin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: dpin
      POSTGRES_PASSWORD: dpin_secret
      POSTGRES_DB: dpin
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: dpin-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: dpin-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    image: grafana/grafana:11.3.0
    container_name: dpin-grafana
    restart: unless-stopped
    ports:
      - "3030:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: dpin_grafana
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana/dashboards:/var/lib/grafana/dashboards:ro

  loki:
    image: grafana/loki:3.2.0
    container_name: dpin-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    ports:
      - "3100:3100"
    volumes:
      - ./config/loki/loki.yml:/etc/loki/loki.yml:ro

  tempo:
    image: grafana/tempo:2.6.0
    container_name: dpin-tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo/tempo.yml
    ports:
      - "3200:3200"
      - "4317:4317"
    volumes:
      - ./config/tempo/tempo.yml:/etc/tempo/tempo.yml:ro

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.111.0
    container_name: dpin-otel
    restart: unless-stopped
    command: ["--config=/etc/otel/config.yml"]
    ports:
      - "4318:4318"
    volumes:
      - ./config/otel/config.yml:/etc/otel/config.yml:ro

  promtail:
    image: grafana/promtail:3.2.0
    container_name: dpin-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./config/promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

volumes:
  pg_data:
